[pytest]
testpaths = .
# 重构后默认收集三个模态总脚本(text/image/video);旧的 test_*.py 已重命名为 .py.old 自动跳过。
# `m3_*_tests.py` 是新拆分的总脚本,与 M3FormatChecker 分模态 subprocess 调用对齐。
python_files = m3_*_tests.py
python_classes = Test*
python_functions = test_*
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
addopts = --tb=short --timeout=1800 -rfE
timeout = 1800
